version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: neuralflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: neuralflow
      POSTGRES_PASSWORD: neuralflow_password
      POSTGRES_DB: neuralflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: neuralflow-app
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://neuralflow:neuralflow_password@postgres:5432/neuralflow
    ports:
      - '3000:3000'

volumes:
  postgres_data:
